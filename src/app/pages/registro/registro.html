<main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-stone-50 to-stone-100 px-4 py-12">
  <div class="max-w-md w-full bg-white rounded-3xl border border-stone-200 shadow-sm overflow-hidden">
    <div class="px-6 sm:px-8 pt-8 pb-2 text-center">
      <h1 class="text-2xl font-serif text-stone-900 mb-1">Crear cuenta</h1>
      <p class="text-sm text-stone-500">Empieza a organizar tus eventos</p>
    </div>

    <div class="px-6 sm:px-8 py-7 space-y-4">
      <div>
        <label class="block text-xs font-medium text-stone-500 mb-1.5 uppercase tracking-wide">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="tu@email.com"
          class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-900"
        />
      </div>

      <div>
        <label class="block text-xs font-medium text-stone-500 mb-1.5 uppercase tracking-wide">Contraseña</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="Mínimo 6 caracteres"
          class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-900"
        />
      </div>

      @if (error) {
        <p class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
          {{ error }}
        </p>
      }

      <button
        (click)="registrarse()"
        [disabled]="cargando || !email || !password"
        class="w-full bg-stone-900 text-white py-3.5 rounded-xl font-medium hover:bg-stone-800 active:scale-[0.98] transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ cargando ? 'Creando cuenta…' : 'Crear cuenta' }}
      </button>

      <p class="text-center text-sm text-stone-500 pt-2">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-stone-900 font-medium hover:underline">Inicia sesión</a>
      </p>
    </div>
  </div>
</main>
