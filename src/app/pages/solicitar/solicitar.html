<main
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-stone-50 to-stone-100 px-4 py-12"
>
  <div
    class="max-w-lg w-full bg-white rounded-3xl border border-stone-200 shadow-sm overflow-hidden"
  >
    @if (enviado) {
      <div class="px-6 sm:px-8 py-12 text-center">
        <div class="text-5xl mb-4">✉️</div>
        <h1 class="text-2xl font-serif text-stone-900 mb-2">¡Mensaje recibido!</h1>
        <p class="text-stone-600 mb-6 leading-relaxed">
          Gracias por escribirme. Te responderé en menos de 24 horas.
        </p>
        <a
          routerLink="/"
          class="inline-block bg-stone-900 text-white px-6 py-3 rounded-xl font-medium hover:bg-stone-800 transition"
        >
          Volver al inicio
        </a>
      </div>
    } @else {
      <div class="px-6 sm:px-8 pt-8 pb-2 text-center">
        <div class="flex justify-center mb-4">
          <a routerLink="/">
            <img
              src="/imagenLogo.png"
              alt="Recuerda tu Día"
              class="h-16 w-16 rounded-full object-cover hover:opacity-80 transition"
            />
          </a>
        </div>
        <h1 class="text-2xl font-serif text-stone-900 mb-1">¿Tienes dudas?</h1>
        <p class="text-sm text-stone-500">Escríbeme y te respondo en menos de 24 horas</p>
      </div>

      <div class="px-6 sm:px-8 py-7 space-y-4">
        <div>
          <label class="block text-xs font-medium text-stone-500 mb-1.5 uppercase tracking-wide">
            Nombre <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="nombre"
            placeholder="Tu nombre"
            class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-900"
          />
        </div>

        <div>
          <label class="block text-xs font-medium text-stone-500 mb-1.5 uppercase tracking-wide">
            Email <span class="text-red-500">*</span>
          </label>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="tu@email.com"
            class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-900"
          />
        </div>

        <div>
          <label class="block text-xs font-medium text-stone-500 mb-1.5 uppercase tracking-wide">
            ¿En qué puedo ayudarte? <span class="text-red-500">*</span>
          </label>
          <textarea
            [(ngModel)]="mensaje"
            rows="4"
            placeholder="Cuéntame tu duda o lo que necesitas..."
            class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-stone-900 resize-none"
          ></textarea>
        </div>

        @if (error) {
          <p class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
            {{ error }}
          </p>
        }

        <button
          (click)="enviar()"
          [disabled]="cargando"
          class="w-full bg-stone-900 text-white py-3.5 rounded-xl font-medium hover:bg-stone-800 active:scale-[0.98] transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ cargando ? 'Enviando…' : 'Enviar mensaje' }}
        </button>

        <p class="text-center text-sm text-stone-500 pt-2">
          ¿Ya tienes cuenta?
          <a routerLink="/login" class="text-stone-900 font-medium hover:underline"
            >Inicia sesión</a
          >
        </p>
      </div>
    }
  </div>
</main>
